<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>坦克大战</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #1a1a2e;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: 'Courier New', monospace;
    color: #e0e0e0;
    user-select: none;
  }
  h1 {
    font-size: 2rem;
    color: #ffd700;
    text-shadow: 0 0 20px #ffa500;
    margin-bottom: 10px;
    letter-spacing: 4px;
  }
  #hud {
    display: flex;
    gap: 40px;
    margin-bottom: 10px;
    font-size: 1rem;
  }
  .hud-item { display: flex; align-items: center; gap: 8px; }
  .hud-label { color: #aaa; }
  .hud-value { color: #ffd700; font-weight: bold; font-size: 1.2rem; }
  #gameCanvas {
    border: 2px solid #4a4a6a;
    box-shadow: 0 0 30px rgba(100, 100, 255, 0.3);
    background: #2d2d2d;
    display: block;
  }
  #overlay {
    position: absolute;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: rgba(0,0,0,0.82);
    border-radius: 12px;
    padding: 40px 60px;
    pointer-events: none;
  }
  #overlay h2 {
    font-size: 2.5rem;
    margin-bottom: 12px;
    letter-spacing: 3px;
  }
  #overlay p { font-size: 1.1rem; color: #ccc; margin-bottom: 6px; }
  #overlay .btn-hint {
    margin-top: 20px;
    color: #ffd700;
    font-size: 1.2rem;
    animation: pulse 1.2s ease-in-out infinite;
  }
  @keyframes pulse {
    0%,100% { opacity: 1; }
    50% { opacity: 0.4; }
  }
  #controls {
    margin-top: 12px;
    font-size: 0.8rem;
    color: #888;
    text-align: center;
    line-height: 1.8;
  }
  .canvas-wrapper { position: relative; }
  .heart { color: #e74c3c; }
</style>
</head>
<body>
<h1>⚔ 坦克大战 ⚔</h1>
<div id="hud">
  <div class="hud-item"><span class="hud-label">分数</span><span class="hud-value" id="scoreEl">0</span></div>
  <div class="hud-item"><span class="hud-label">关卡</span><span class="hud-value" id="levelEl">1</span></div>
  <div class="hud-item"><span class="hud-label">生命</span><span class="hud-value heart" id="livesEl">♥♥♥</span></div>
  <div class="hud-item"><span class="hud-label">敌人</span><span class="hud-value" id="enemiesEl">0</span></div>
</div>
<div class="canvas-wrapper">
  <canvas id="gameCanvas" width="600" height="600"></canvas>
  <div id="overlay">
    <h2 style="color:#ffd700">坦克大战</h2>
    <p>消灭所有敌方坦克！</p>
    <p>保护基地不被摧毁！</p>
    <div class="btn-hint">按 SPACE 或 ENTER 开始游戏</div>
  </div>
</div>
<div id="controls">
  方向键 / WASD — 移动 &nbsp;|&nbsp; 空格 — 射击 &nbsp;|&nbsp; P — 暂停
</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const overlay = document.getElementById('overlay');
const scoreEl = document.getElementById('scoreEl');
const levelEl = document.getElementById('levelEl');
const livesEl = document.getElementById('livesEl');
const enemiesEl = document.getElementById('enemiesEl');

const TILE = 40;
const COLS = canvas.width / TILE;
const ROWS = canvas.height / TILE;

// ─── Game State ───────────────────────────────────────────────
let state = 'start'; // start | playing | paused | gameover | win
let score = 0;
let lives = 3;
let level = 1;
let bullets = [];
let explosions = [];
let enemies = [];
let player = null;
let base = null;
let map = [];
let animFrame = null;
let lastTime = 0;
let enemySpawnTimer = 0;
let enemiesLeft = 0;
const MAX_ENEMIES_ON_SCREEN = 4;

// ─── Directions ────────────────────────────────────────────────
const DIR = { UP: 0, RIGHT: 1, DOWN: 2, LEFT: 3 };
const DX = [0, 1, 0, -1];
const DY = [-1, 0, 1, 0];

// ─── Tile Types ───────────────────────────────────────────────
const EMPTY = 0, BRICK = 1, STEEL = 2, WATER = 3, BASE_TILE = 4;

// ─── Input ────────────────────────────────────────────────────
const keys = {};
document.addEventListener('keydown', e => {
  keys[e.code] = true;
  if ((e.code === 'Space' || e.code === 'Enter') && state === 'start') startGame();
  else if ((e.code === 'Space' || e.code === 'Enter') && state === 'gameover') startGame();
  else if ((e.code === 'Space' || e.code === 'Enter') && state === 'win') nextLevel();
  else if (e.code === 'KeyP' && state === 'playing') pause();
  else if (e.code === 'KeyP' && state === 'paused') resume();
  e.preventDefault();
});
document.addEventListener('keyup', e => { keys[e.code] = false; });

// ─── Level Maps ────────────────────────────────────────────────
function buildMap(lvl) {
  const W = COLS, H = ROWS;
  const m = Array.from({length: H}, () => Array(W).fill(EMPTY));

  const setRect = (x, y, w, h, t) => {
    for (let dy = 0; dy < h; dy++)
      for (let dx = 0; dx < w; dx++)
        if (y+dy < H && x+dx < W) m[y+dy][x+dx] = t;
  };

  // Border water channel at edges
  if (lvl >= 2) {
    for (let i = 0; i < W; i++) { m[0][i] = WATER; m[H-1][i] = WATER; }
    for (let i = 0; i < H; i++) { m[i][0] = WATER; m[i][W-1] = WATER; }
  }

  const patterns = [
    // Level 1
    () => {
      setRect(2,2,2,3,BRICK); setRect(11,2,2,3,BRICK);
      setRect(5,1,5,2,BRICK); setRect(5,4,5,2,BRICK);
      setRect(2,8,2,3,BRICK); setRect(11,8,2,3,BRICK);
      setRect(5,7,5,2,BRICK); setRect(5,10,5,2,BRICK);
      setRect(6,13,3,1,STEEL);
    },
    // Level 2
    () => {
      setRect(1,1,3,5,BRICK); setRect(11,1,3,5,BRICK);
      setRect(5,1,5,1,STEEL); setRect(5,5,5,1,STEEL);
      setRect(3,7,9,1,BRICK); setRect(1,9,4,3,BRICK);
      setRect(10,9,4,3,BRICK); setRect(5,9,5,1,WATER);
      setRect(6,12,3,1,STEEL);
    },
    // Level 3
    () => {
      setRect(1,1,2,2,STEEL); setRect(12,1,2,2,STEEL);
      setRect(4,1,7,1,BRICK); setRect(4,3,3,2,BRICK);
      setRect(8,3,3,2,BRICK); setRect(1,5,4,1,WATER);
      setRect(10,5,4,1,WATER); setRect(5,5,5,2,STEEL);
      setRect(2,7,11,1,BRICK); setRect(1,9,4,4,BRICK);
      setRect(10,9,4,4,BRICK); setRect(5,9,5,1,WATER);
      setRect(6,11,3,2,STEEL);
    }
  ];

  const idx = Math.min(lvl - 1, patterns.length - 1);
  patterns[idx]();

  // Base position: bottom-center
  const bx = Math.floor(W/2) - 1;
  const by = H - 3;
  // protect base with bricks
  setRect(bx-1, by, 1, 2, BRICK); setRect(bx+2, by, 1, 2, BRICK);
  setRect(bx-1, by-1, 4, 1, BRICK);
  m[by][bx] = BASE_TILE;

  return { m, baseX: bx, baseY: by };
}

// ─── Tank Class ────────────────────────────────────────────────
class Tank {
  constructor(tx, ty, dir, isPlayer, tier=0) {
    this.x = tx * TILE + TILE/2;
    this.y = ty * TILE + TILE/2;
    this.dir = dir;
    this.isPlayer = isPlayer;
    this.tier = tier; // 0=basic, 1=fast, 2=armored
    this.hp = tier === 2 ? 3 : 1;
    this.speed = isPlayer ? 120 : [70, 110, 60][tier];
    this.shootCooldown = 0;
    this.shootInterval = isPlayer ? 0.4 : [1.5, 1.2, 2.0][tier];
    this.alive = true;
    this.size = TILE * 0.8;
    this.moveTimer = 0;
    this.aiDir = dir;
    this.stuck = 0;
    this.shield = isPlayer ? 3 : 0; // spawn shield seconds
  }

  update(dt) {
    this.shootCooldown = Math.max(0, this.shootCooldown - dt);
    if (this.shield > 0) this.shield -= dt;

    if (this.isPlayer) this.updatePlayer(dt);
    else this.updateAI(dt);
  }

  updatePlayer(dt) {
    let mx = 0, my = 0;
    if (keys['ArrowUp'] || keys['KeyW'])    { this.dir = DIR.UP;    my = -1; }
    if (keys['ArrowDown'] || keys['KeyS'])  { this.dir = DIR.DOWN;  my = 1; }
    if (keys['ArrowLeft'] || keys['KeyA'])  { this.dir = DIR.LEFT;  mx = -1; }
    if (keys['ArrowRight'] || keys['KeyD']) { this.dir = DIR.RIGHT; mx = 1; }
    if (mx !== 0) my = 0; // horizontal priority for diagonal

    if (mx !== 0 || my !== 0) {
      const nx = this.x + mx * this.speed * dt;
      const ny = this.y + my * this.speed * dt;
      if (!this.collides(nx, this.y)) this.x = nx;
      if (!this.collides(this.x, ny)) this.y = ny;
      this.clamp();
    }

    if (keys['Space'] && this.shootCooldown <= 0) {
      this.shoot();
    }
  }

  updateAI(dt) {
    this.moveTimer -= dt;
    if (this.moveTimer <= 0 || this.stuck > 3) {
      this.aiDir = Math.floor(Math.random() * 4);
      this.moveTimer = 0.8 + Math.random() * 1.5;
      this.stuck = 0;
    }
    this.dir = this.aiDir;
    const nx = this.x + DX[this.dir] * this.speed * dt;
    const ny = this.y + DY[this.dir] * this.speed * dt;
    let moved = false;
    if (!this.collides(nx, ny)) {
      this.x = nx; this.y = ny;
      this.clamp();
      moved = true;
    } else {
      this.stuck++;
    }

    // Aim at player occasionally
    if (player && Math.random() < dt * 0.4) {
      const dx = player.x - this.x;
      const dy = player.y - this.y;
      if (Math.abs(dx) > Math.abs(dy))
        this.dir = dx > 0 ? DIR.RIGHT : DIR.LEFT;
      else
        this.dir = dy > 0 ? DIR.DOWN : DIR.UP;
    }

    if (this.shootCooldown <= 0) this.shoot();
  }

  collides(cx, cy) {
    const half = this.size / 2 - 2;
    const corners = [
      [cx - half, cy - half],
      [cx + half, cy - half],
      [cx - half, cy + half],
      [cx + half, cy + half],
    ];
    for (const [px, py] of corners) {
      const tx = Math.floor(px / TILE);
      const ty = Math.floor(py / TILE);
      if (tx < 0 || ty < 0 || tx >= COLS || ty >= ROWS) return true;
      const t = map[ty][tx];
      if (t === BRICK || t === STEEL || t === WATER || t === BASE_TILE) return true;
    }
    // Collide with other tanks
    const tanks = [player, ...enemies].filter(t => t && t.alive && t !== this);
    for (const other of tanks) {
      if (Math.abs(other.x - cx) < this.size - 2 && Math.abs(other.y - cy) < this.size - 2)
        return true;
    }
    return false;
  }

  clamp() {
    const half = this.size / 2;
    this.x = Math.max(half, Math.min(canvas.width - half, this.x));
    this.y = Math.max(half, Math.min(canvas.height - half, this.y));
  }

  shoot() {
    this.shootCooldown = this.shootInterval;
    const bx = this.x + DX[this.dir] * (this.size/2 + 4);
    const by = this.y + DY[this.dir] * (this.size/2 + 4);
    bullets.push(new Bullet(bx, by, this.dir, this.isPlayer));
  }

  draw() {
    ctx.save();
    ctx.translate(this.x, this.y);
    ctx.rotate(this.dir * Math.PI / 2);

    const s = this.size;
    const h = s / 2;

    // Shield effect
    if (this.shield > 0 && Math.floor(Date.now() / 100) % 2 === 0) {
      ctx.strokeStyle = '#00ffff';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(0, 0, h + 4, 0, Math.PI * 2);
      ctx.stroke();
    }

    const bodyColor = this.isPlayer
      ? '#4caf50'
      : ['#e74c3c', '#e67e22', '#8e44ad'][this.tier];
    const darkColor = this.isPlayer
      ? '#2e7d32'
      : ['#922b21', '#a04000', '#5b2c6f'][this.tier];

    // Tracks
    ctx.fillStyle = darkColor;
    ctx.fillRect(-h, -h, s * 0.22, s);
    ctx.fillRect(h - s * 0.22, -h, s * 0.22, s);
    for (let i = 0; i < 5; i++) {
      ctx.fillStyle = i % 2 === 0 ? darkColor : '#333';
      ctx.fillRect(-h, -h + i * s/5, s * 0.22, s/5);
      ctx.fillRect(h - s*0.22, -h + i * s/5, s * 0.22, s/5);
    }

    // Body
    ctx.fillStyle = bodyColor;
    ctx.fillRect(-h * 0.65, -h * 0.65, s * 0.65 * 1.3, s * 0.65 * 1.3);

    // Turret base
    ctx.fillStyle = darkColor;
    ctx.beginPath();
    ctx.arc(0, 0, h * 0.42, 0, Math.PI * 2);
    ctx.fill();

    // Gun barrel
    ctx.fillStyle = darkColor;
    ctx.fillRect(-h * 0.12, -h * 0.75, h * 0.24, h * 0.75);

    // Armor plates
    ctx.fillStyle = bodyColor;
    ctx.fillRect(-h * 0.5, -h * 0.55, h, h * 0.18);

    // HP pips for armored tanks
    if (!this.isPlayer && this.hp > 1) {
      ctx.restore();
      ctx.save();
      ctx.translate(this.x, this.y - h - 6);
      for (let i = 0; i < this.hp; i++) {
        ctx.fillStyle = '#f1c40f';
        ctx.fillRect(-this.hp * 5 + i * 11, 0, 9, 4);
      }
    }

    ctx.restore();
  }
}

// ─── Bullet Class ──────────────────────────────────────────────
class Bullet {
  constructor(x, y, dir, fromPlayer) {
    this.x = x; this.y = y;
    this.dir = dir;
    this.fromPlayer = fromPlayer;
    this.speed = 280;
    this.alive = true;
    this.size = 6;
  }

  update(dt) {
    this.x += DX[this.dir] * this.speed * dt;
    this.y += DY[this.dir] * this.speed * dt;

    if (this.x < 0 || this.x > canvas.width || this.y < 0 || this.y > canvas.height) {
      this.alive = false;
      spawnExplosion(this.x, this.y, 'small');
      return;
    }

    // Tile collision
    const tx = Math.floor(this.x / TILE);
    const ty = Math.floor(this.y / TILE);
    if (tx >= 0 && ty >= 0 && tx < COLS && ty < ROWS) {
      const t = map[ty][tx];
      if (t === BRICK) {
        map[ty][tx] = EMPTY;
        this.alive = false;
        spawnExplosion(this.x, this.y, 'small');
      } else if (t === STEEL) {
        this.alive = false;
        spawnExplosion(this.x, this.y, 'small');
      } else if (t === WATER) {
        // pass
      } else if (t === BASE_TILE) {
        this.alive = false;
        map[ty][tx] = EMPTY;
        spawnExplosion(this.x, this.y, 'large');
        setTimeout(() => endGame(false, '基地被摧毁！'), 600);
      }
    }

    if (!this.alive) return;

    // Tank collision
    const tanks = this.fromPlayer ? enemies : (player ? [player] : []);
    for (const tank of tanks) {
      if (!tank || !tank.alive) continue;
      if (tank.shield > 0) continue;
      if (Math.abs(this.x - tank.x) < tank.size/2 && Math.abs(this.y - tank.y) < tank.size/2) {
        tank.hp--;
        this.alive = false;
        if (tank.hp <= 0) {
          tank.alive = false;
          spawnExplosion(tank.x, tank.y, 'large');
          if (this.fromPlayer) {
            score += [100, 200, 400][tank.tier] * level;
            scoreEl.textContent = score;
            enemiesLeft--;
            enemiesEl.textContent = enemiesLeft;
          } else {
            spawnExplosion(tank.x, tank.y, 'large');
          }
        } else {
          spawnExplosion(this.x, this.y, 'small');
        }
        break;
      }
    }
  }

  draw() {
    ctx.save();
    ctx.fillStyle = this.fromPlayer ? '#ffe082' : '#ef9a9a';
    ctx.shadowColor = this.fromPlayer ? '#ffeb3b' : '#f44336';
    ctx.shadowBlur = 8;
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size/2, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }
}

// ─── Explosion ────────────────────────────────────────────────
function spawnExplosion(x, y, size) {
  const count = size === 'large' ? 14 : 6;
  for (let i = 0; i < count; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = size === 'large' ? 60 + Math.random() * 100 : 30 + Math.random() * 60;
    explosions.push({
      x, y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      life: 1,
      maxLife: 0.4 + Math.random() * 0.4,
      r: size === 'large' ? 4 + Math.random() * 6 : 2 + Math.random() * 4,
      color: ['#ffd700','#ff6b35','#ff4444','#ffeb3b'][Math.floor(Math.random()*4)]
    });
  }
}

function updateExplosions(dt) {
  for (const p of explosions) {
    p.x += p.vx * dt;
    p.y += p.vy * dt;
    p.life -= dt / p.maxLife;
    p.vx *= 0.92;
    p.vy *= 0.92;
  }
  explosions = explosions.filter(p => p.life > 0);
}

function drawExplosions() {
  for (const p of explosions) {
    ctx.save();
    ctx.globalAlpha = Math.max(0, p.life);
    ctx.fillStyle = p.color;
    ctx.shadowColor = p.color;
    ctx.shadowBlur = 6;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r * p.life, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }
}

// ─── Map Drawing ───────────────────────────────────────────────
function drawMap() {
  for (let row = 0; row < ROWS; row++) {
    for (let col = 0; col < COLS; col++) {
      const t = map[row][col];
      const x = col * TILE, y = row * TILE;
      if (t === EMPTY) continue;

      if (t === BRICK) {
        ctx.fillStyle = '#b5651d';
        ctx.fillRect(x, y, TILE, TILE);
        ctx.fillStyle = '#8b4513';
        const bw = TILE/2, bh = TILE/3;
        for (let r = 0; r < 3; r++) {
          const offset = r % 2 === 0 ? 0 : bw/2;
          for (let c = -1; c < 3; c++) {
            ctx.strokeStyle = '#5c3317';
            ctx.lineWidth = 1;
            ctx.strokeRect(x + c*bw + offset, y + r*bh, bw, bh);
          }
        }
      } else if (t === STEEL) {
        ctx.fillStyle = '#78909c';
        ctx.fillRect(x, y, TILE, TILE);
        ctx.fillStyle = '#b0bec5';
        ctx.fillRect(x+2, y+2, TILE-4, 4);
        ctx.fillRect(x+2, y+2, 4, TILE-4);
        ctx.fillStyle = '#546e7a';
        ctx.fillRect(x+TILE-6, y+2, 4, TILE-4);
        ctx.fillRect(x+2, y+TILE-6, TILE-4, 4);
      } else if (t === WATER) {
        const t2 = Date.now() / 600;
        ctx.fillStyle = `hsl(${200 + Math.sin(t2)*10}, 70%, ${35 + Math.sin(t2+col+row)*5}%)`;
        ctx.fillRect(x, y, TILE, TILE);
        ctx.fillStyle = 'rgba(255,255,255,0.15)';
        ctx.fillRect(x + 4 + Math.sin(t2+col)*3, y + TILE*0.3, TILE*0.4, 3);
        ctx.fillRect(x + TILE*0.5 + Math.cos(t2+row)*3, y + TILE*0.6, TILE*0.35, 3);
      } else if (t === BASE_TILE) {
        ctx.fillStyle = '#ffd700';
        ctx.fillRect(x, y, TILE, TILE);
        ctx.strokeStyle = '#ff6b35';
        ctx.lineWidth = 2;
        const s = TILE * 0.35;
        ctx.save();
        ctx.translate(x + TILE/2, y + TILE/2);
        ctx.beginPath();
        for (let i = 0; i < 5; i++) {
          const a = (i * 4 * Math.PI / 5) - Math.PI/2;
          i === 0 ? ctx.moveTo(Math.cos(a)*s, Math.sin(a)*s)
                  : ctx.lineTo(Math.cos(a)*s, Math.sin(a)*s);
        }
        ctx.closePath();
        ctx.fillStyle = '#ff6b35';
        ctx.fill();
        ctx.restore();
      }
    }
  }
}

// ─── Spawn Logic ───────────────────────────────────────────────
const SPAWN_POINTS = [[0,0],[COLS-1,0],[Math.floor(COLS/2),0]];

function spawnEnemy() {
  if (enemies.filter(e => e.alive).length >= MAX_ENEMIES_ON_SCREEN) return;
  if (enemiesLeft <= 0) return;

  const sp = SPAWN_POINTS[Math.floor(Math.random() * SPAWN_POINTS.length)];
  const tier = Math.min(Math.floor(Math.random() * (level + 1)), 2);
  const e = new Tank(sp[0], sp[1], DIR.DOWN, false, tier);
  enemies.push(e);
}

// ─── Game Control ─────────────────────────────────────────────
function startGame() {
  score = 0; lives = 3; level = 1;
  scoreEl.textContent = 0;
  levelEl.textContent = 1;
  initLevel();
  state = 'playing';
  overlay.style.display = 'none';
  requestAnimationFrame(loop);
}

function initLevel() {
  const { m, baseX, baseY } = buildMap(level);
  map = m;
  bullets = [];
  explosions = [];
  enemies = [];
  enemiesLeft = 4 + level * 3;
  enemySpawnTimer = 1;
  levelEl.textContent = level;
  enemiesEl.textContent = enemiesLeft;

  // Spawn player in bottom area
  const px = Math.floor(COLS/2);
  const py = ROWS - 2;
  player = new Tank(px, py, DIR.UP, true);
  updateLivesHud();
}

function updateLivesHud() {
  livesEl.textContent = '♥'.repeat(Math.max(0, lives));
}

function pause() {
  state = 'paused';
  showOverlay('⏸ 游戏暂停', '按 P 继续');
}
function resume() {
  state = 'playing';
  overlay.style.display = 'none';
  requestAnimationFrame(loop);
}

function endGame(win, msg) {
  if (win) {
    state = 'win';
    showOverlay('关卡完成！', `${msg || ''}  得分: ${score}`, '按 SPACE 进入下一关');
  } else {
    lives--;
    updateLivesHud();
    if (lives <= 0) {
      state = 'gameover';
      showOverlay('游戏结束', `最终得分: ${score}`, '按 SPACE 重新开始');
    } else {
      // respawn
      setTimeout(() => {
        if (state === 'playing') {
          const px = Math.floor(COLS/2);
          const py = ROWS - 2;
          player = new Tank(px, py, DIR.UP, true);
        }
      }, 1000);
    }
  }
}

function nextLevel() {
  level++;
  initLevel();
  state = 'playing';
  overlay.style.display = 'none';
}

function showOverlay(title, sub, hint) {
  overlay.innerHTML = `
    <h2 style="color:#ffd700">${title}</h2>
    ${sub ? `<p>${sub}</p>` : ''}
    ${hint ? `<div class="btn-hint">${hint}</div>` : ''}
  `;
  overlay.style.display = 'flex';
}

// ─── Main Loop ────────────────────────────────────────────────
function loop(ts) {
  if (state !== 'playing') return;
  const dt = Math.min((ts - lastTime) / 1000, 0.05);
  lastTime = ts;

  update(dt);
  draw();
  requestAnimationFrame(loop);
}

function update(dt) {
  // Spawn enemies
  enemySpawnTimer -= dt;
  if (enemySpawnTimer <= 0) {
    spawnEnemy();
    enemySpawnTimer = 2.5 - level * 0.2;
  }

  // Update player
  if (player && player.alive) player.update(dt);
  else if (player && !player.alive && state === 'playing') {
    player = null;
    endGame(false, '坦克被击毁！');
  }

  // Update enemies
  for (const e of enemies) if (e.alive) e.update(dt);
  enemies = enemies.filter(e => e.alive || explosions.length > 0);

  // Update bullets
  for (const b of bullets) b.update(dt);
  bullets = bullets.filter(b => b.alive);

  updateExplosions(dt);

  // Win condition
  const aliveEnemies = enemies.filter(e => e.alive).length;
  if (enemiesLeft <= 0 && aliveEnemies === 0 && state === 'playing') {
    state = 'win';
    showOverlay('关卡完成！', `得分: ${score}`, '按 SPACE 进入下一关');
  }
}

function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // Background grid
  ctx.fillStyle = '#262626';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  ctx.strokeStyle = '#2e2e2e';
  ctx.lineWidth = 0.5;
  for (let c = 0; c <= COLS; c++) {
    ctx.beginPath(); ctx.moveTo(c*TILE, 0); ctx.lineTo(c*TILE, canvas.height); ctx.stroke();
  }
  for (let r = 0; r <= ROWS; r++) {
    ctx.beginPath(); ctx.moveTo(0, r*TILE); ctx.lineTo(canvas.width, r*TILE); ctx.stroke();
  }

  drawMap();
  if (player && player.alive) player.draw();
  for (const e of enemies) if (e.alive) e.draw();
  for (const b of bullets) b.draw();
  drawExplosions();

  // Enemy count indicator at top
  const alive = enemies.filter(e => e.alive).length;
  const pending = enemiesLeft;
  ctx.fillStyle = 'rgba(0,0,0,0.4)';
  ctx.fillRect(canvas.width - (pending+alive)*14 - 8, 4, (pending+alive)*14+4, 14);
  for (let i = 0; i < alive + pending; i++) {
    ctx.fillStyle = i < alive ? '#e74c3c' : '#555';
    ctx.fillRect(canvas.width - (i+1)*14 + 2, 6, 10, 10);
  }
}

</script>
